name = "altimist-com-router"
main = "src/index.ts"
compatibility_date = "2026-04-28"

# Per-environment configs. Routes are commented out — bind them via
# Cloudflare dashboard or `flarectl` during the staging-W testbed
# rollout, then enable here once we're confident in the rollout.
# (See ADR-012 for the phased cutover plan.)

[env.staging]
name = "altimist-com-router-staging"
workers_dev = true   # also publish to <name>.<account>.workers.dev for smoke testing

[env.staging.vars]
ALTIMIST_ID_ORIGIN = "https://staging.altimist.id"
ALTIMIST_ID_APEX = "staging.altimist.com"

[[env.staging.routes]]
pattern = "*.staging.altimist.com/.well-known/*"
zone_name = "altimist.com"

[[env.staging.routes]]
pattern = "staging.altimist.com/.well-known/*"
zone_name = "altimist.com"

# F-011 path-form did.json. Narrow pattern so altimist.com's own
# /users/<handle>/<other-paths> never hit this Worker — only the
# did.json leaf is proxied.
[[env.staging.routes]]
pattern = "staging.altimist.com/users/*/did.json"
zone_name = "altimist.com"

[env.production]
name = "altimist-com-router-production"
workers_dev = true   # exposes altimist-com-router-production.<account>.workers.dev for smoke testing before binding altimist.com routes; flip to false once altimist.com routes are bound and stable

[env.production.vars]
ALTIMIST_ID_ORIGIN = "https://altimist.id"
ALTIMIST_ID_APEX = "altimist.com"

[[env.production.routes]]
pattern = "*.altimist.com/.well-known/*"
zone_name = "altimist.com"

[[env.production.routes]]
pattern = "altimist.com/.well-known/*"
zone_name = "altimist.com"

# F-011 path-form did.json. Narrow pattern so altimist.com's own
# /users/<handle>/<other-paths> never hit this Worker — only the
# did.json leaf is proxied.
[[env.production.routes]]
pattern = "altimist.com/users/*/did.json"
zone_name = "altimist.com"
