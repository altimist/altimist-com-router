name = "altimist-com-router"
main = "src/index.ts"
compatibility_date = "2026-04-28"

# Per-environment configs. Routes are commented out — bind them via
# Cloudflare dashboard or `flarectl` during the staging-W testbed
# rollout, then enable here once we're confident in the rollout.
# (See ADR-012 for the phased cutover plan.)

[env.staging]
name = "altimist-com-router-staging"
workers_dev = true   # also publish to <name>.<account>.workers.dev for smoke testing

[env.staging.vars]
ALTIMIST_ID_ORIGIN = "https://staging.altimist.id"
ALTIMIST_ID_APEX = "altimist.dev"
# Rendering backend. The apex (altimist.dev) is fronted by this Worker
# end-to-end (its A record points at the CF-only sink; ADR-022 ported to
# staging), so the proxy must target a cert-stable Vercel hostname instead of
# the apex. This is corporate-website-v2's stable staging alias; its middleware
# reads x-altimist-host to render the marketing site (apex) or a /public/<handle>
# profile (subdomain).
VERCEL_ORIGIN = "corporate-website-v2-altimistdev-altimists-projects.vercel.app"

# Subdomain catch-all: proxied through to VERCEL_ORIGIN with x-altimist-host.
# Subsumes *.altimist.dev/.well-known/* (handled by the same Worker via
# resolver dispatch in src/index.ts).
[[env.staging.routes]]
pattern = "*.altimist.dev/*"
zone_name = "altimist.dev"

[[env.staging.routes]]
pattern = "altimist.dev/.well-known/*"
zone_name = "altimist.dev"

# F-011 path-form did.json. CF Worker route patterns only allow
# wildcards at the start of the hostname OR end of the path, so we
# can't bind `<apex>/users/*/did.json` directly (error code 10022 on
# deploy). Bind the broader `<apex>/users/*` and let the Worker
# filter: routeResolverRequest matches the PATH_FORM_DID regex
# (`/users/<handle>/did.json`) and proxies to altimist-id; everything
# else under /users/* returns null → the Worker's 404 fallback.
[[env.staging.routes]]
pattern = "altimist.dev/users/*"
zone_name = "altimist.dev"

# Apex catch-all (ADR-022, ported to staging): this Worker now fronts the
# altimist.dev apex end-to-end, mirroring production. Resolver paths (the
# more-specific routes above) dispatch to altimist-id; every other apex path is
# proxied to VERCEL_ORIGIN with x-altimist-host: altimist.dev so the marketing
# site renders. The apex A record points at the CF-only sink (AAAA 100::), so
# without this route apex traffic would hit a dead origin. The more-specific
# apex routes above are subsumed by this catch-all but kept as explicit,
# defensive bindings.
[[env.staging.routes]]
pattern = "altimist.dev/*"
zone_name = "altimist.dev"

# F-011 path-form did.json. CF Worker route patterns only allow
# wildcards at the start of the hostname OR end of the path, so we
# can't bind `<apex>/users/*/did.json` directly (error code 10022 on
# deploy). Bind the broader `<apex>/users/*` and let the Worker
# filter: routeResolverRequest matches the PATH_FORM_DID regex
# (`/users/<handle>/did.json`) and proxies to altimist-id; everything
# else under /users/* returns null → the Worker's 404 fallback.
[[env.staging.routes]]
pattern = "staging.altimist.com/users/*"
zone_name = "altimist.com"

[env.production]
name = "altimist-com-router-production"
workers_dev = true   # exposes altimist-com-router-production.<account>.workers.dev for smoke testing before binding altimist.com routes; flip to false once altimist.com routes are bound and stable

[env.production.vars]
ALTIMIST_ID_ORIGIN = "https://altimist.id"
ALTIMIST_ID_APEX = "altimist.com"
# Rendering backend. The apex (altimist.com) is fronted by this Worker
# end-to-end (its A record points at the CF-only sink; ADR-022), so the proxy
# must target a cert-stable Vercel hostname instead of the apex. This is
# corporate-website-v2's stable production alias; its middleware reads
# x-altimist-host to render the marketing site (apex) or a /public/<handle>
# profile (subdomain).
VERCEL_ORIGIN = "corporate-website-v2-altimists-projects.vercel.app"

# Subdomain catch-all: proxied through to VERCEL_ORIGIN with x-altimist-host.
# Subsumes *.altimist.com/.well-known/* (handled by the same Worker via
# resolver dispatch in src/index.ts).
[[env.production.routes]]
pattern = "*.altimist.com/*"
zone_name = "altimist.com"

[[env.production.routes]]
pattern = "altimist.com/.well-known/*"
zone_name = "altimist.com"

# F-011 path-form did.json. See the staging-env comment above for the
# CF route-pattern constraint that forces the broader `/users/*`.
[[env.production.routes]]
pattern = "altimist.com/users/*"
zone_name = "altimist.com"

# Apex catch-all (ADR-022): this Worker now fronts the altimist.com apex
# end-to-end. Resolver paths (the two more-specific routes above) are dispatched
# to altimist-id; every other apex path is proxied to VERCEL_ORIGIN (the
# corporate-website-v2 rendering backend) with x-altimist-host: altimist.com so
# the marketing site renders. The apex A record points at the CF-only sink
# (AAAA 100::), so without this route apex traffic would hit a dead origin. The
# two more-specific apex routes above are now subsumed by this catch-all but are
# kept as explicit, defensive bindings.
[[env.production.routes]]
pattern = "altimist.com/*"
zone_name = "altimist.com"
