name: Enforce staging → main

on:
  pull_request:
    branches: [main]

jobs:
  check-source-branch:
    runs-on: ubuntu-latest
    steps:
      - name: Verify PR comes from staging
        run: |
          if [ "${{ github.head_ref }}" != "staging" ]; then
            echo "::error::PRs into main must come from the staging branch. Got: ${{ github.head_ref }}"
            exit 1
          fi
          echo "✓ Source branch is staging"
